<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sync — Template</title>

<link rel="stylesheet" href="style.css">
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet"/>
</head>
<body>

<!-- FIXED: added this wrapper. It's the element every cqw unit
     in style.css measures against, and it's what keeps the whole
     card scaling as one piece on zoom/resize instead of drifting. -->
<div class="canvas">
    <main>

        <!-- LEFT TOP -->
        <div class="left-top">
            <div class="left-top-text">
                <h1>Better</h1>
                <h1>now</h1>
                <h1>closer</h1>
            </div>
            <!-- FIXED: class renamed from .left-top-img to .left-top-image
                 to match the CSS (the old class was never styled) -->
            <div class="left-top-image">
                <img src="./download (3).png" alt="illustration">
            </div>
        </div>

        <!-- RIGHT TOP -->
        <div class="right-top">
            <div class="right-top-header">
                <span>Connect.</span>
                <i class="ri-arrow-right-up-line"></i>
            </div>
            <div class="hand">
                <img src="./download (4).png" alt="handshake">
            </div>
        </div>

        <!-- LEFT CENTER -->
        <div class="left-center1">
            <div class="left-container">
                <div class="date">
                    <h4>24 Mar</h4>
                    <h4>9:00 to 10:00</h4>
                </div>
                <div class="team">
                    <h2>Team</h2>
                    <h2>Adaptation</h2>
                </div>
                <div class="meeting">
                    <h4>HR Grooming</h4>
                </div>
            </div>
        </div>

        <!-- CENTER -->
        <div class="center">
            <div class="logo">
                <div class="logo-circle">
                    <img src="./image.png" alt="sync logo">
                </div>
                <h1>sync</h1>
            </div>
        </div>

        <!-- RIGHT -->
        <div class="right">
            <div class="right-content">
                <h1>Bring People</h1>
                <h2>Together</h2>
                <p>[ sync.com ]</p>
            </div>
            <div class="people">
                <img src="./download (5).png" alt="people">
            </div>
        </div>

        <!-- BOTTOM LEFT -->
        <div class="bottom-left">
            <div class="chat">
                <div class="msg white">Hi! Where are you?</div>
                <div class="msg green">I'll be in touch</div>
            </div>
        </div>

        <!-- BOTTOM CENTER -->
        <div class="bottom-center">
            <button>I'll be in touch</button>
            <div class="users">
                <div class="user"><i class="ri-user-smile-line"></i></div>
                <div class="user"><i class="ri-user-add-line"></i></div>
                <div class="user"><i class="ri-group-3-fill"></i></div>
            </div>
        </div>

    </main>
</div>

</body>
</html>
