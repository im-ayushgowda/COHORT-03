<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"  rel="stylesheet"
/>
    <title>Document</title>
</head>
<body>
        <main>
            <header>

                <div class="head">
                    <i class="ri-menu-4-line"></i>
                    <h1>Bright.</h1>
                </div>

                <div class="search">
                    <i class="ri-seo-fill"></i>
                    <input type="text" placeholder="Search product items">
                </div>

                <div class="icons">
                    <i class="ri-notification-4-fill"></i>
                    <i class="ri-account-box-fill"></i>
                </div>

            </header>


            <div class="hero">
                <img class="hero-bottle" src="./download.png" alt="product bottle">
                <div class="hero-text">
                    
                    <span class="hero-date">SEPTEMBER 12–22</span>
                    <h2>Enjoy free home<br>delivery in this summer</h2>
                    <p>Designer Dresses – Pick from trendy Designer Dress</p>
                    <button class="hero-btn">Get Started</button>
                    
            </div>
            <img class="hero-orange" src="./download (1).png" alt="orange half">
            </div>
            <div class="card1">
                <span class="price">Start From $45.30</span>
                <span class="fav"><i class="ri-heart-line"></i></span>
                <span class="card-title">Women's Shoe</span>
            </div>
            <div class="card2">
                <span class="price">Start From $105.00</span>
                <span class="fav"><i class="ri-heart-line"></i></span>
                <span class="card-title">Cycle Accessories</span>
            </div>

            <div class="card3">
                <span class="price">Start From $34.00</span>
                <span class="fav"><i class="ri-heart-line"></i></span>
                <span class="card-title">Home Accessories</span>
            </div>
        </main>
</body>
</html>
